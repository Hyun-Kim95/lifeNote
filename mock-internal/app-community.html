<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lifeNote — 커뮤니티 (자체 목업)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ln-app-shell">
      <header class="ln-topbar">
        <a class="ln-back" href="index.html">← 허브</a>
        <button type="button" class="ln-theme-toggle" aria-pressed="false">다크 모드</button>
      </header>
      <main class="ln-app-main">
        <h1 style="font-size: 1.25rem">커뮤니티</h1>
        <div class="ln-chips" style="margin-bottom: 1rem">
          <button type="button" class="ln-chip" aria-selected="true">전체</button>
          <button type="button" class="ln-chip" aria-selected="false">계획 공유</button>
          <button type="button" class="ln-chip" aria-selected="false">To-do</button>
        </div>
        <article class="ln-card">
          <h2 style="font-size: 1rem">주간 루틴 공유해요</h2>
          <p class="ln-muted" style="margin: 0">@user12 · 댓글 4</p>
        </article>
        <article class="ln-card">
          <h2 style="font-size: 1rem">식비 줄이기 챌린지 D-3</h2>
          <p class="ln-muted" style="margin: 0">@mina · 댓글 9</p>
        </article>
        <details class="ln-details">
          <summary>빈 피드 / 신고 흐름</summary>
          <p class="ln-muted" style="margin-top: 0.75rem">게시글 없음, 신고 접수 등은 2차 범위에서 상세화.</p>
        </details>
      </main>
      <nav class="ln-tabbar" aria-label="하단 탭">
        <a class="ln-tab" href="app-home.html">홈</a>
        <a class="ln-tab" href="app-todo.html">할 일</a>
        <a class="ln-tab" href="app-budget.html">가계부</a>
        <a class="ln-tab" href="app-community.html" aria-current="page">커뮤니티</a>
        <a class="ln-tab" href="index.html">더보기</a>
      </nav>
    </div>
    <script src="theme.js"></script>
  </body>
</html>
